<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรแกรมคำนวณ 60/40</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            text-align: center;
        }
        .result-container {
            margin-top: 20px;
            text-align: left;
            padding: 0 10px;
        }
        .result-row {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #eee;
        }
        .result-row:last-child {
            border-bottom: none;
        }
        .result-label {
            font-size: 14px;
            color: #666;
            margin: 0 0 5px 0;
        }
        .result-value {
            font-size: 26px;
            font-weight: bold;
            color: #222;
            margin: 0;
        }
        #result60 {
            color: #CC0000; 
        }
        #result40 {
            color: #2e7d32; 
        }
        /* สไตล์ของข้อความแจ้งเตือน */
        .warning-box {
            color: #d32f2f;
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
            padding: 10px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            display: none; /* ซ่อนไว้ก่อนในตอนแรก */
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณอัตโนมัติ 60/40</h2>
    
    <div class="input-group">
        <label for="amount">ใส่ราคาสินค้า</label>
        <input type="number" id="amount" placeholder="ราคา..." oninput="calculateRatio()">
    </div>

    <div class="result-container">
        <div class="result-row">
            <p class="result-label">รัฐจ่าย 60% = คือ</p>
            <p class="result-value" id="result60">0</p>
        </div>
        
        <div class="result-row">
            <p class="result-label">เราจ่าย 40% = คือ</p>
            <p class="result-value" id="result40">0</p>
        </div>
    </div>

    <div id="warningMessage" class="warning-box"></div>
</div>

<script>
    function calculateRatio() {
        let amount = document.getElementById('amount').value;
        let warningBox = document.getElementById('warningMessage');
        
        if (amount === '' || isNaN(amount)) {
            document.getElementById('result60').innerText = '0';
            document.getElementById('result40').innerText = '0';
            warningBox.style.display = 'none'; // ซ่อนข้อความเตือนเมื่อไม่มีข้อมูล
            return;
        }
        
        let currentAmount = parseFloat(amount);
        
        let value60 = currentAmount * 0.6;
        let value40 = currentAmount * 0.4;
        
        document.getElementById('result60').innerText = Number(value60.toFixed(2)).toLocaleString();
        document.getElementById('result40').innerText = Number(value40.toFixed(2)).toLocaleString();
        
        // --- ส่วนตรวจสอบเงื่อนไขแจ้งเตือน ---
        if (value40 > 133.33) {
            // คำนวณจำนวนที่เกินจาก 133.33
            let overrun = value40 - 133.33;
            
            // แสดงข้อความแจ้งเตือนพร้อมจำนวนที่เกิน (จัดรูปแบบทศนิยม 2 ตำแหน่ง)
            warningBox.innerText = `⚠️ ส่วนต่างที่ต้องจ่ายเพิ่ม ${Number(overrun.toFixed(2)).toLocaleString()}`;
            warningBox.style.display = 'block'; // สั่งให้กล่องแจ้งเตือนแสดงตัวออกหน้าเว็บ
        } else {
            warningBox.style.display = 'none'; // ถ้าไม่เกิน ให้ซ่อนกล่องแจ้่งเตือนไว้ตามเดิม
        }
    }
</script>

</body>
</html>
