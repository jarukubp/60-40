<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คำนวณไทยช่วยไทย พลัส</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            text-align: center;
        }
        /* ส่วนแสดงผลลัพธ์แบบเรียบง่าย ไม่ต้องไฮไลท์กล่อง */
        .result-container {
            margin-top: 20px;
            text-align: left;
            padding: 0 10px;
        }
        .result-row {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #eee; /* เส้นประบางๆ แบ่งสัดส่วน */
        }
        .result-row:last-child {
            border-bottom: none; /* แถวสุดท้ายไม่ต้องมีเส้นประ */
        }
        .result-label {
            font-size: 14px;
            color: #666;
            margin: 0 0 5px 0;
        }
        .result-value {
            font-size: 26px;
            font-weight: bold;
            color: #222;
            margin: 0;
        }
        #result40 {
    color: #2e7d32; /* สีเขียวโทนสบายตาและเห็นเด่นชัด */
}
    </style>
</head>
<body>

<div class="container">
    <h2>คำนวณอัตโนมัติ 60/40</h2>
    
    <div class="input-group">
        <label for="amount">ใส่ราคาสินค้า</label>
        <input type="number" id="amount" placeholder="ราคา..." oninput="calculateRatio()">
    </div>

    <div class="result-container">
        <div class="result-row">
            <p class="result-label">รัฐจ่าย 60% =</p>
            <p class="result-value" id="result60">0</p>
        </div>
        
        <div class="result-row">
            <p class="result-label">เราจ่าย 40% =</p>
            <p class="result-value" id="result40">0</p>
        </div>
    </div>
</div>

<script>
    function calculateRatio() {
        // ดึงค่าจากช่องกรอกข้อมูล
        let amount = document.getElementById('amount').value;
        
        // ถ้าไม่มีการกรอกข้อมูล ให้เซ็ตเป็น 0 ทั้งคู่
        if (amount === '' || isNaN(amount)) {
            document.getElementById('result60').innerText = '0';
            document.getElementById('result40').innerText = '0';
            return;
        }
        
        let currentAmount = parseFloat(amount);
        
        // คำนวณค่าสัดส่วน 60% และ 40%
        let value60 = currentAmount * 0.6;
        let value40 = currentAmount * 0.4;
        
        // ส่งผลลัพธ์ไปแสดงผลบนหน้าเว็บ พร้อมจัดรูปแบบตัวเลขให้สวยงาม
        document.getElementById('result60').innerText = Number(value60.toFixed(2)).toLocaleString();
        document.getElementById('result40').innerText = Number(value40.toFixed(2)).toLocaleString();
    }
</script>

</body>
</html>
